<!DOCTYPE html>
<html lang = "th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เกมเมอร์ประเภทไหน?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
  
<body>
<main id="quiz-container" class="quiz-container ">

  <section id="start-screen" class="start-screen anim-slideUp">

    <h1 class="">คุณเคยสงสัยไหมว่าตัวเองเป็นเกมเมอร์แบบไหน</h1>
    <p class="">ตอบคำถามอย่างจริงใจเพื่อรับรู้บุคลิกภาพเกมเมอร์ของคุณ</p>
    <button id="ปุ่มเริ่ม" class="btn-primary">
        คลิกเพื่อเริ่ม
    </button>

</section>

  <section id="quiz-content" class="hidden"> 
    <div id="question-area" class="question-area"> 
        <div id ="question-text" class="question-text"></div>
        <div id ="answer-buttons" class="answer-buttons "></div>
    </div>

  </section>


  <!-- result เป็นพี่น้องของ quiz-content ภายใน quiz-container -->
  <section id="result-display" class="result-display hidden">
    <div class="question-area"> 
        <h2 id="result-type" class="result-title"></h2>
        
        <div id="result-image-container">
            <img id="result-img" src="" alt="Result Image">
        </div>

        <p id="result-message" class="result-desc"></p>
          
        <button id="restart-btn" class="btn-primary">เริ่มใหม่</button>
    </div>
</section>
</main>
<script src="script.js"></script>
</body>
</html>
